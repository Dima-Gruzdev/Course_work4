<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ client.fio }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h1>{{ client.fio }}</h1>
    <p><strong>Email:</strong> {{ client.email }}</p>
    <p><strong>Комментарий:</strong> {{ client.comment|default:"—" }}</p>
    <p><strong>Дата создания:</strong> {{ client.created_at }}</p>

    <a href="{% url 'development:client_update' client.pk %}" class="btn btn-warning">Редактировать</a>
    <a href="{% url 'development:client_delete' client.pk %}" class="btn btn-danger">Удалить</a>
    <a href="{% url 'development:client_list' %}" class="btn btn-secondary">Назад к списку</a>
</div>
</body>
</html>
