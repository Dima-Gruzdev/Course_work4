{% extends 'clients/base.html' %}
{% block title %}Удалить клиента?{%endblock%}
{%block content%}
{% include 'clients/header.html' %}

<div class="container mt-4">
    <h1>Удалить клиента "{{ object.fio }}"?</h1>
    <p>Это действие нельзя отменить.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'development:client_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
