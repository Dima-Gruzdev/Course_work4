<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% if object %}Редактировать клиента{% else %}Добавить клиента{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h1>{% if object %}Редактировать клиента{% else %}Добавить клиента{% endif %}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">{% if object %}Сохранить{% else %}Добавить{% endif %}</button>
        <a href="{% url 'development:client_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
</body>
</html>
