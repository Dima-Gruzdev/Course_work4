{% extends 'clients/base.html' %}
{% block title %}Удаление сообщения{%endblock%}
{%block content%}
{% include 'clients/header.html' %}

<h1>Удалить сообщение "{{ object.subject }}"?</h1>
<p>Это действие нельзя отменить.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'mailings:message_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
